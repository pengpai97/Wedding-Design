<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: #fff;
            padding: 20px;
            line-height: 1.6;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #be123c;
        }

        .header h1 {
            color: #be123c;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.2em;
        }

        .print-btn {
            background: #be123c;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .print-btn:hover {
            background: #9f1239;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .table-section {
            margin-bottom: 30px;
            page-break-inside: avoid;
        }

        .table-header {
            background: linear-gradient(135deg, #be123c 0%, #db2777 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.3em;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .table-category {
            font-size: 0.8em;
            opacity: 0.9;
            font-weight: normal;
        }

        .guest-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .guest-card {
            background: #fff5f5;
            border: 1px solid #fecdd3;
            border-radius: 6px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .guest-name {
            font-weight: bold;
            color: #1f2937;
            font-size: 1.05em;
        }

        .guest-count {
            background: #be123c;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85em;
            min-width: 35px;
            text-align: center;
        }

        .empty-notice {
            color: #9ca3af;
            font-style: italic;
            padding: 10px 20px;
        }

        .summary {
            background: #fef2f2;
            border: 2px solid #fecdd3;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .summary-item {
            text-align: center;
        }

        .summary-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #be123c;
        }

        .summary-label {
            color: #666;
            font-size: 0.95em;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #999;
            font-size: 0.9em;
        }

        @media print {
            .print-btn {
                display: none;
            }

            body {
                padding: 0;
            }

            .header h1 {
                font-size: 2em;
            }

            .table-header {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .guest-card {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        @media (max-width: 768px) {
            .guest-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>

        // 生成宾客名单

            const container = document.getElementById('guestList');
            let html = '';

            // 按桌号排序
            const tableNumbers = Object.keys(tableData).map(Number).sort((a, b) => a - b);

            // 统计数据
            let totalGuests = 0;
            let totalPeople = 0;

            tableNumbers.forEach(tableNum => {
                const data = tableData[tableNum];
                const category = TABLE_CATEGORIES[tableNum] || '';

                totalGuests += data.total_groups;
                totalPeople += data.total_people;

                html += `
                    <div class="table-section">
                        <div class="table-header">
                            <span>第 ${tableNum} 桌</span>
                            <span class="table-category">${category} · 共${data.total_people}人</span>
                        </div>
                        <div class="guest-grid">
                `;

                data.guests.forEach(guest => {
                    html += `
                        <div class="guest-card">
                            <span class="guest-name">${guest.name}</span>
                            <span class="guest-count">${guest.count}人</span>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // 更新统计
            document.getElementById('totalTables').textContent = tableNumbers.length;
            document.getElementById('totalGuests').textContent = totalGuests;
            document.getElementById('totalPeople').textContent = totalPeople;
        }
